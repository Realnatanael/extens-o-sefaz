<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    body { 
      width: 250px; 
      font-family: Arial, sans-serif; 
      padding: 15px; 
      margin: 0; 
      background-color: #f4f4f9;
    }
    h3 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #0073e6; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: bold; 
      margin-bottom: 10px;
    }
    button:hover { background-color: #005cb3; }
    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <h3>Consolidador SEFAZ</h3>
  <button id="btnExportar">Processar Produtos e Baixar</button>
  <div id="status"></div>
