<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    /* Removendo o min-height fixo e ajustando a largura da janela */
    html, body {
  width: 340px;
  margin: 0;
  padding: 0;
  background: #764ba2; /* cor sólida de fallback, mesma do gradiente */
}
body {
  min-height: auto; /* REMOVA o min-height: 280px */
}
.container {
  padding: 28px 24px 24px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 200% 200%;
  animation: gradientShift 8s ease infinite;
}

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Círculos decorativos no fundo */
    .container::before,
    .container::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }
    /* Ajustando o tamanho e posição dos círculos decorativos */
    .container::before {
      width: 120px;
      height: 120px;
      top: -40px;
      right: -30px;
    }

    .container::after {
      width: 80px;
      height: 80px;
      bottom: -20px;
      left: -20px;
    }

    /* Card principal com efeito glass */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }
    /* Estilizando o cabeçalho do card */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    /* Ícone com animação de flutuação */
    .icon {
      font-size: 36px;
      margin-bottom: 8px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    /* Animação de flutuação do ícone */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    h3 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin: 0;
    }

    /* Botão com animações */
    button {
      position: relative;
      width: 100%;
      padding: 14px 20px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }
    /* Efeito de expansão do círculo ao passar o mouse */
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }
    /* Efeito de hover e clique */
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    button:hover::before {
      width: 300px;
      height: 300px;
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    button.loading {
      pointer-events: none;
    }

    button.loading .btn-text {
      opacity: 0;
    }
    
    button.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    /* Animação de rotação do círculo */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-text {
      position: relative;
      z-index: 1;
    }

    /* Status com fade-in */
    #status {
      margin-top: 16px;
      padding: 10px 12px;
      font-size: 12px;
      text-align: center;
      border-radius: 8px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      background: #f0f0f5;
      color: #555;
    }

    #status:not(:empty) {
      animation: fadeIn 0.3s ease;
    }

    #status.success {
      background: #d4edda;
      color: #155724;
    }

    #status.error {
      background: #f8d7da;
      color: #721c24;
    }

    #status.loading {
      background: #e7f1ff;
      color: #004085;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <span class="icon">📊</span>
        <h3>Consolidador SEFAZ</h3>
        <p class="subtitle">Exporte produtos da nota para Excel</p>
      </div>

      <button id="btnExportar">
        <span class="btn-text">Processar Produtos e Baixar</span>
      </button>

      <div id="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
